<div class="row justify-content-center">
    {% if weather %}
    <div class="col-md-4">
        <div class="card weather-card text-center p-4 shadow">
            <h3>{{ weather.city }}</h3>
            <h1>{{ weather.temp }}°C</h1>
            <p>{{ weather.desc }}</p>
        </div>
    </div>
    {% endif %}
</div>
