<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trang chủ</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #4facfe, #00f2fe);
            min-height: 100vh;
            color: white;
        }

        .hero {
            text-align: center;
            padding: 80px 20px;
        }

        .card {
            border-radius: 20px;
        }

        .weather-card {
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
        }

        .btn-custom {
            background-color: #ffffff;
            color: #007bff;
            border-radius: 30px;
            padding: 10px 25px;
            font-weight: bold;
        }

        .btn-custom:hover {
            background-color: #f1f1f1;
        }
    </style>
</head>
<body>
    <div class="text-end p-3">
    {% if user.is_authenticated %}
        Xin chào, {{ user.username }} |
        <a href="{% url 'logout' %}" class="btn btn-light btn-sm">Đăng xuất</a>
    {% else %}
        <a href="{% url 'login' %}" class="btn btn-light btn-sm">Đăng nhập</a>
        <a href="{% url 'register' %}" class="btn btn-light btn-sm">Đăng ký</a>
    {% endif %}
</div>

<div class="container">

    <!-- HERO -->
    <div class="hero">
        <h1 class="display-4">☀️ Web Thời Tiết</h1>
        <p class="lead">Xem thời tiết nhanh chóng & chính xác</p>

        <a href="/weather/" class="btn btn-custom mt-3">
            Xem thời tiết ngay
        </a>
    </div>

    <!-- SEARCH -->
    <div class="row justify-content-center mb-5">
        <div class="col-md-6">
            <form method="POST">
                {% csrf_token %}
                <div class="input-group">
                    <input type="text" name="city" class="form-control" placeholder="Nhập thành phố...">
                    <button class="btn btn-light">Tìm</button>
                </div>
            </form>
        </div>
    </div>

    <!-- WEATHER DEMO CARD -->
    <div class="row justify-content-center">

    <!-- Hà Nội -->
    <div class="col-md-4 mb-3">
        <div class="card weather-card text-center p-4 shadow">
            <h3>Hà Nội</h3>
            <h1>30°C</h1>
            <p>☁️ Nhiều mây</p>
        </div>
    </div>

    <!-- Hồ Chí Minh -->
    <div class="col-md-4 mb-3">
        <div class="card weather-card text-center p-4 shadow">
            <h3>Hồ Chí Minh</h3>
            <h1>32°C</h1>
            <p>☀️ Nắng</p>
        </div>
    </div>

    <!-- Đà Nẵng -->
    <div class="col-md-4 mb-3">
        <div class="card weather-card text-center p-4 shadow">
            <h3>Đà Nẵng</h3>
            <h1>28°C</h1>
            <p>🌧️ Mưa nhẹ</p>
        </div>
    </div>

</div>

</body>
</html>
